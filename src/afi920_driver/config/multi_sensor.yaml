# Multi-sensor configuration example
# Each sensor gets its own namespace and parameters
# Result: /radar_front/PointCloud2, /radar_front/RDI, /radar_front/SHI, /radar_front/SPI, ...

radar_front:
  afi920_driver:
    ros__parameters:
      sensor_ip: "192.168.10.150"
      frame_id: "radar_front"
      publish_detections: true
      publish_health: true
      publish_performance: true
      validate_e2e: true
      e2e_strict: false

radar_rear:
